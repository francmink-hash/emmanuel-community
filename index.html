<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMUNAUTE EMMANUEL | Hub Central</title>
    <meta name="description"
        content="Hub central de la plateforme COMMUNAUTE EMMANUEL - Accédez à nos services Tontine, Finance et Trafic.">
    <style>
        /* 
         * DESIGN SYSTEM : ANTIGRAVITY PREMIUM
         * Minimalist, Elegant, High-Performance
         */

        :root {
            --bg-deep: #0a0a0a;
            --bg-accent: #121212;
            --text-main: #ffffff;
            --text-sub: #888888;
            --gold-primary: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #0a0a0a;
            background: #0a0a0a;
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. BLOC D'IDENTITE (Haut Gauche) */
        .identity-block {
            position: absolute;
            top: 4rem;
            left: 4rem;
            animation: fadeInDown 1s ease-out;
            z-index: 10;
        }

        .title-main {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.95);
            /* Blanc cassé soyeux */
        }

        .domain-link {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: var(--text-sub);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .domain-link:hover {
            color: var(--gold-primary);
        }

        .tagline {
            font-size: 1.1rem;
            font-style: italic;
            color: var(--gold-primary);
            text-shadow: 0 0 15px var(--gold-glow);
            letter-spacing: 0.5px;
        }

        /* 2. MENU CENTRAL */
        .central-hub {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            text-align: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            padding: 1rem 3rem;
            position: relative;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 100%;
            background: var(--gold-primary);
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: var(--transition-smooth);
            opacity: 0;
        }

        .nav-link:hover {
            letter-spacing: 10px;
            color: #000;
            border-color: var(--gold-primary);
            box-shadow: 0 0 30px var(--gold-glow);
            transform: translateY(-5px);
        }

        .nav-link:hover::before {
            width: 100%;
            opacity: 1;
        }

        /* 3. ELEMENTS DECORATIFS & ANIMATIONS */
        .decoration {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-link {
            animation: fadeInUp 0.8s ease-out both;
        }

        .nav-link:nth-child(1) {
            animation-delay: 0.3s;
        }

        .nav-link:nth-child(2) {
            animation-delay: 0.5s;
        }

        .nav-link:nth-child(3) {
            animation-delay: 0.7s;
        }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .identity-block {
                top: 3rem;
                left: 3rem;
            }

            .title-main {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
                min-height: 100vh;
                padding: 2rem 1rem;
                display: flex;
            }

            .identity-block {
                position: relative;
                top: 0;
                left: 0;
                text-align: center;
                margin-bottom: 5rem;
            }

            .title-main {
                font-size: 2.2rem;
                letter-spacing: -1px;
            }

            .nav-menu {
                gap: 1.5rem;
            }

            .nav-link {
                font-size: 1.1rem;
                padding: 1.2rem 1rem;
                letter-spacing: 3px;
            }

            .nav-link:hover {
                letter-spacing: 5px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem 0.75rem;
            }

            .identity-block {
                margin-bottom: 3rem;
            }

            .title-main {
                font-size: 1.8rem;
                letter-spacing: -0.5px;
            }

            .domain-link {
                font-size: 0.8rem;
            }

            .tagline {
                font-size: 0.95rem;
            }

            .nav-menu {
                gap: 1rem;
            }

            .nav-link {
                font-size: 0.95rem;
                padding: 1rem 0.75rem;
                letter-spacing: 2px;
            }

            .nav-link:hover {
                letter-spacing: 3px;
            }

            .decoration {
                font-size: 0.7rem;
                bottom: 1rem;
                right: 1rem;
            }
        }

        @media (max-width: 360px) {
            .title-main {
                font-size: 1.5rem;
            }

            .nav-link {
                font-size: 0.85rem;
                padding: 0.9rem 0.5rem;
                letter-spacing: 1.5px;
            }

            .tagline {
                font-size: 0.85rem;
            }
        }

        /* Touch-friendly improvements */
        @media (hover: none) and (pointer: coarse) {
            .nav-link {
                min-height: 48px;
                min-width: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 1rem 0.75rem;
            }

            .identity-block {
                margin-bottom: 2rem;
            }

            .title-main {
                font-size: 1.6rem;
                margin-bottom: 0.3rem;
            }

            .nav-menu {
                gap: 0.75rem;
            }

            .nav-link {
                font-size: 0.9rem;
                padding: 0.8rem 0.5rem;
            }
        }
    </style>
</head>

<body>

    <main class="central-hub">

    <!-- FOOTER / DECO -->
    <div class="decoration">
        PROJET Emmanuel community &copy; 2026
